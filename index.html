<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y O N · MEOW <3 </title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b12;
      background-image: radial-gradient(circle at 20% 30%, #1e1a2b 0%, #08080c 90%);
      font-family: 'Inter', 'Poppins', sans-serif;
      color: #eceaff;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glass-panel {
      max-width: 1400px;
      width: 100%;
      background: rgba(16, 16, 22, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 30px 50px -20px #000000, 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    /* ===== رأس الملف الشخصي ===== */
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #2a2538;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      border: 3px solid rgba(200, 180, 255, 0.3);
      box-shadow: 0 20px 30px -10px #b69eff40, 0 0 0 1px #b79eff inset;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar .initials {
      font-size: 3.2rem;
      font-weight: 600;
      color: #cbbaff;
      display: none;
    }

    .avatar:has(img) .initials {
      display: none;
    }

    .avatar:not(:has(img)) .initials {
      display: block;
    }

    .profile-header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #d6ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
    }

    .profile-header .badge {
      background: rgba(70, 60, 100, 0.5);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.5rem;
      border-radius: 50px;
      border: 1px solid #6a5a9a40;
      color: #cfc6ff;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ===== شبكة البطاقات الرئيسية ===== */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 2rem;
      margin-bottom: 3.5rem;
    }

    .card {
      background: rgba(20, 18, 30, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.02);
      border-radius: 2.2rem;
      padding: 1.8rem 1.6rem;
      transition: all 0.25s ease;
      box-shadow: 0 12px 30px -15px #000000;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(170, 130, 255, 0.25);
      box-shadow: 0 25px 35px -18px #a07dff;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .card-header i {
      font-size: 2.2rem;
      width: 2.6rem;
      color: #c5b3ff;
    }

    .card-header h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #f0eaff;
    }

    .detail-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      margin: 0.4rem 0;
      border: 1px solid rgba(255,255,255,0.02);
    }

    .detail-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #9a92bb;
      font-weight: 600;
    }

    .detail-value {
      font-weight: 500;
      color: #ffffff;
      word-break: break-word;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 1.2rem;
    }

    .btn {
      background: rgba(30, 26, 45, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.03);
      padding: 0.6rem 1.4rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #dbd2ff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.15s;
      backdrop-filter: blur(5px);
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn i {
      font-size: 1rem;
      color: #b7a6ff;
    }

    .btn:hover {
      background: #3c3360;
      border-color: #9e8be0;
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px dashed #5c5280;
    }

    .btn-outline:hover {
      background: #2f2850;
      border-style: solid;
    }

    .tiktok-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .tiktok-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.15);
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: 1px solid #3a3355;
    }

    /* ===== قسم الأصدقاء الجديد ===== */
    .friends-section {
      margin-top: 2.5rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #e5dbff;
    }

    .section-title i {
      font-size: 2rem;
      color: #b49eff;
    }

    .friends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }

    .friend-card {
      background: rgba(25, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.02);
      border-radius: 1.8rem;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.2s;
    }

    .friend-card:hover {
      background: rgba(40, 35, 60, 0.8);
      border-color: rgba(170, 130, 255, 0.2);
      transform: translateY(-3px);
    }

    .friend-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .friend-name {
      font-weight: 600;
      font-size: 1rem;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    .friend-user {
      font-size: 0.8rem;
      color: #afa2d9;
      direction: ltr;
      text-align: left;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-friend-btn {
      background: rgba(50, 45, 70, 0.6);
      border: none;
      color: #cbbdff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.9rem;
      border: 1px solid #5a4e8233;
    }

    .copy-friend-btn:hover {
      background: #4a3f75;
      color: white;
    }

    .footer-note {
      text-align: center;
      margin-top: 3.5rem;
      color: #7a73a0;
      font-size: 0.9rem;
      border-top: 1px solid #2f2b44;
      padding-top: 2rem;
    }

    .footer-note a {
      color: #b7aaf0;
      text-decoration: none;
      border-bottom: 1px dotted #6a5b9a;
    }

    /* رسالة النسخ */
    .toast-msg {
      visibility: hidden;
      min-width: 180px;
      background: #26203b;
      color: #f0e9ff;
      text-align: center;
      border-radius: 50px;
      padding: 10px 20px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.95rem;
      border: 1px solid #8f78d0;
      box-shadow: 0 10px 25px black;
      backdrop-filter: blur(12px);
      z-index: 100;
      transition: visibility 0.2s, opacity 0.2s;
      opacity: 0;
    }

    .toast-msg.show {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="glass-panel">
    <!-- ===== الملف الشخصي ===== -->
    <div class="profile-header">
      <div class="avatar">
        <img src="https://i.imgur.com/iT3JjmS.png" alt="Y O N" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

      </div>
      <h1>Y O N</h1>
      <span class="badge"><i class="fa-regular fa-compass"></i> XT Clan Owner</span>

    <!-- ===== حساباتي ===== -->
    <div class="social-grid">
      <!-- Discord -->
      <div class="card">

          <span class="detail-label">اليوزر</span>
          <span class="detail-value">@1.yon.</span>
          <button class="btn btn-outline" onclick="copyToClipboard('q4s1')" style="margin-right: auto;"><i class="fa-regular fa-copy"></i> نسخ</button>
        </div>
        <div class="detail-row">
          <span class="detail-label">الاسم</span>
          <span class="detail-value">Y O N</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">السيرفر</span>
          <span class="detail-value">XT Clan</span>
        </div>
        <div class="btn-group">
          <a href="https://discord.com/invite/3yRurht3HG" target="_blank" class="btn"><i class="fab fa-discord"></i> invite/3yRurht3HG</a>
          <a href="http://dsc.gg/xxtclan" target="_blank" class="btn"><i class="fa-regular fa-link"></i> dsc.gg/xxtclan</a>
        </div>
      </div>

      <!-- Telegram -->
      <div class="card">
        <div class="card-header">
          <i class="fab fa-telegram-plane"></i>
          <h2>تيليجرام</h2>
        </div>
        <div class="detail-row">
          <span class="detail-label">الاسم</span>
          <span class="detail-value">12:00</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">اليوزر</span>
          <span class="detail-value">@y4on0</span>
          <button class="btn btn-outline" onclick="copyToClipboard('@q4s12')" style="margin-right: auto;"><i class="fa-regular fa-copy"></i> نسخ</button>
        </div>
        <div class="btn-group">
          <a href="https://t.me/q4s11" target="_blank" class="btn"><i class="fab fa-telegram"></i> t.me/q4s11</a>
        </div>
      </div>

      <!-- TikTok -->
      <div class="card">
        <div class="card-header">
          <i class="fab fa-tiktok"></i>
          <h2>تيك توك</h2>
        </div>
        <div class="tiktok-list">
          <div class="tiktok-item">
            <span><i class="fab fa-tiktok"></i> @y4on5</span>
            <a href="https://www.tiktok.com/@y4on5" target="_blank" class="btn" style="padding: 0.3rem 1.2rem;">زيارة</a>
          </div>
        </div>
      </div>

      <!-- Xbox -->
      <div class="card">
        <div class="card-header">
          <i class="fab fa-xbox"></i>
          <h2>Xbox</h2>
        </div>
        <div class="detail-row">
          <span class="detail-label">Gamertag</span>
          <span class="detail-value" style="font-weight: 600;">y4on0</span>
          <button class="btn btn-outline" onclick="copyToClipboard('y4on0')" style="margin-right: auto;"><i class="fa-regular fa-copy"></i> نسخ</button>
        </div>
        <div class="btn-group" style="margin-top: 0.8rem;">
          <a href="https://account.xbox.com/en-us/profile?gamertag=y4on0" target="_blank" class="btn"><i class="fa-regular fa-window-maximize"></i> زيارة الملف</a>
        </div>
      </div>
    </div>

    <div class="friends-section">
      <div class="section-title">
        <i class="fab fa-discord"></i>
        <span>الأصدقاء · Discord</span>
      </div>
      <div class="friends-grid" id="friendsGrid">
      </div>
    </div>

    <div class="footer-note">
      <i class="fa-regular fa-heart" style="color: #b19eff;"></i> XT Clan · XT Dev
    </div>
  </div>

  <div id="toast" class="toast-msg"><i class="fa-regular fa-clipboard"></i> تم النسخ</div>

  <script>
    const friendsList = [
      { name: "لابوبو", user: "@heroprain_24211" },
      { name: "ImJxil", user: "@q4s1" },
      { name: "ROYO", user: "@royo0643" }
    ];

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        let toast = document.getElementById('toast');
        toast.classList.add('show');
        toast.innerHTML = `<i class="fa-regular fa-check-circle"></i> تم النسخ: ${text}`;
        setTimeout(() => {
          toast.classList.remove('show');
        }, 1700);
      }).catch(() => {
        alert('لم نتمكن من النسخ تلقائياً، لكن القيمة هي: ' + text);
      });
    }

    // إنشاء بطاقات الأصدقاء ديناميكياً
    function renderFriends() {
      const grid = document.getElementById('friendsGrid');
      if (!grid) return;
      friendsList.forEach(friend => {
        const card = document.createElement('div');
        card.className = 'friend-card';
        card.innerHTML = `
          <div class="friend-info">
            <span class="friend-name">${friend.name}</span>
            <span class="friend-user">${friend.user}</span>
          </div>
          <button class="copy-friend-btn" onclick="copyToClipboard('${friend.user}')" title="نسخ اليوزر">
            <i class="fa-regular fa-copy"></i>
          </button>
        `;
        grid.appendChild(card);
      });
    }

    // معالجة خطأ الصورة الشخصية
    document.addEventListener('DOMContentLoaded', function() {
      renderFriends();
      const avatarImg = document.querySelector('.avatar img');
      if (avatarImg) {
        avatarImg.onerror = function() {
          this.style.display = 'none';
          const initials = this.nextElementSibling;
          if (initials) initials.style.display = 'flex';
        };
      }
    });
  </script>
</body>
</html>
